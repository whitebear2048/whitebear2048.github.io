<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>金刚石晶胞</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: #f8f8f8; overflow: hidden; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; }

        /* ---------- 左侧说明面板 (自适应折叠) ---------- */
        .info-panel {
            position: fixed; top: 16px; left: 16px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            width: min(320px, calc(100vw - 32px));
            z-index: 200;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            border: 1px solid rgba(255,255,255,0.5);
            overflow: hidden;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
            background: rgba(255,255,255,0.8);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .panel-header h4 {
            color: #1a1a2e;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .panel-header h4::before {
            content: "💎";
            font-size: 1.2rem;
        }
        .toggle-icon {
            font-size: 1.4rem;
            line-height: 1;
            color: #666;
            transition: transform 0.2s;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            border-radius: 50%;
        }
        .info-panel.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }
        .panel-content {
            padding: 16px 18px 18px;
            transition: opacity 0.2s, max-height 0.3s;
            background: white;
        }
        .info-panel.collapsed .panel-content {
            display: none;
        }
        .panel-content p {
            color: #2d3e5f;
            font-size: 14px;
            line-height: 1.6;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .panel-content p::before {
            content: "•";
            color: #3366ff;
            font-weight: bold;
            font-size: 16px;
        }

        /* ---------- 右侧控制区 (固定菜单 + 浮动按钮) ---------- */
        .control-buttons {
            position: fixed;
            right: 20px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 250;
            transition: opacity 0.2s, transform 0.2s;
        }
        /* 默认桌面显示 (JS会动态添加/移除show类) */
        .control-buttons {
            display: flex;
        }
        .control-buttons:not(.show) {
            display: none;
        }

        /* 单个控制按钮样式 (原按钮改造) */
        .control-btn {
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            color: white;
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 150px;
            text-align: center;
        }
        .control-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .control-btn.active {
            filter: brightness(0.85);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
        }
        #toggleExtendBtn { background: #3366ff; }
        #toggleAllFcc2Btn { background: #ff6633; }
        #toggleFcc1Btn { background: #339966; }

        /* 移动端菜单按钮 (汉堡) */
        #menuToggle {
            position: fixed;
            right: 20px;
            top: 20px;
            width: 58px;
            height: 58px;
            border-radius: 40px;
            background: #1e1e2f;
            color: white;
            font-size: 32px;
            border: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 300;
            display: none;  /* 默认隐藏，JS控制显示 */
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            backdrop-filter: blur(8px);
            background: rgba(30,30,47,0.9);
            border: 1px solid rgba(255,255,255,0.2);
        }
        #menuToggle:active {
            transform: scale(0.92);
        }

        /* 桌面大屏调整 */
        @media (min-width: 1024px) {
            .control-btn { padding: 10px 22px; }
        }

        /* 确保画布不遮挡按钮 */
        #canvas-container {
            position: relative;
            z-index: 1;
        }

        /* 提示信息优化 */
        .info-panel p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- 左侧自适应折叠面板 -->
    <div class="info-panel" id="infoPanel">
        <div class="panel-header" id="panelHeader">
            <h4>操作说明</h4>
            <span class="toggle-icon" id="toggleIcon">▼</span>
        </div>
        <div class="panel-content" id="panelContent">
            <p>📐 晶格常数 a = 2 (放大显示)</p>
            <p>🔹 蓝色框：FCC1 (顶点+面心)</p>
            <p>🔸 紫色框：FCC2 (位移1/4)</p>
            <p>⚫ 黑色/深灰：FCC1原子</p>
            <p>🟣 深紫/浅紫：FCC2原子</p>
            <p>🖱️ 左键旋转 | 滚轮缩放 | 右键平移</p>
            <p>🔘 按钮：显示/隐藏对应套构</p>
        </div>
    </div>

    <!-- 右侧控制按钮组 (三个原按钮放在此容器内) -->
    <div class="control-buttons" id="controlButtons">
        <button class="control-btn" id="toggleExtendBtn">显示金刚石结构</button>
        <button class="control-btn" id="toggleAllFcc2Btn">隐藏紫色FCC</button>
        <button class="control-btn" id="toggleFcc1Btn">隐藏黑色FCC</button>
    </div>

    <!-- 移动端汉堡菜单按钮 -->
    <button id="menuToggle" class="mobile-menu-btn">☰</button>

    <!-- ES Module配置 (保持不变) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ========== 1. 基础初始化 ==========
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.set(4, 4, 6);
        camera.lookAt(1, 1, 1);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xf8f8f8);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(1, 1, 1);
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.rotateSpeed = 0.8;

        // 辅助元素 (稍微调暗以适应浅色背景)
        scene.add(new THREE.AxesHelper(4));
        scene.add(new THREE.GridHelper(8, 16, 0xc0c0c0, 0xe0e0e0));

        // ========== 2. 核心参数 ==========
        const a = 2;
        const d = a/4;
        
        const groups = {
            core: { fcc1Atoms: [], bonds: [], fcc1Frame: null },
            extend: { fcc2ExtendAtoms: [], fcc2Frame: null },
            allFcc2: { fcc2CoreAtoms: [], fcc2AllAtoms: [] }
        };

        // ========== 3. 原子坐标 ==========
        const fcc1 = {
            vertex: [[0,0,0],[a,0,0],[0,a,0],[0,0,a],[a,a,0],[a,0,a],[0,a,a],[a,a,a]],
            face: [[a/2,a/2,0],[a/2,a/2,a],[a/2,0,a/2],[a/2,a,a/2],[0,a/2,a/2],[a,a/2,a/2]]
        };

        const fcc2 = {
            vertex: fcc1.vertex.map(p => [p[0]+d, p[1]+d, p[2]+d]),
            face: fcc1.face.map(p => [p[0]+d, p[1]+d, p[2]+d])
        };

        const diamondCore = [
            [d,d,d], [3*d,3*d,d], [3*d,d,3*d], [d,3*d,3*d]
        ];

        // ========== 4. 材质 ==========
        const mats = {
            fcc1Vertex: new THREE.MeshLambertMaterial({ color: 0x222222 }),
            fcc1Face: new THREE.MeshLambertMaterial({ color: 0x444444 }),
            fcc2Core: new THREE.MeshLambertMaterial({ color: 0x993399 }),
            fcc2Extend: new THREE.MeshLambertMaterial({ color: 0xcc66cc }),
            bond: new THREE.LineBasicMaterial({ color: 0x888888 }),
            frame1: new THREE.LineBasicMaterial({ color: 0x3366ff }),
            frame2: new THREE.LineBasicMaterial({ color: 0x993399, transparent: true, opacity: 0.8 })
        };

        const atomGeo = new THREE.SphereGeometry(0.08, 24, 24);
        const coreGeo = new THREE.SphereGeometry(0.1, 24, 24);

        // ========== 5. 绘制核心元素 ==========
        // FCC1原子
        fcc1.vertex.forEach(pos => {
            const atom = new THREE.Mesh(atomGeo, mats.fcc1Vertex);
            atom.position.set(...pos);
            scene.add(atom);
            groups.core.fcc1Atoms.push(atom);
        });
        fcc1.face.forEach(pos => {
            const atom = new THREE.Mesh(atomGeo, mats.fcc1Face);
            atom.position.set(...pos);
            scene.add(atom);
            groups.core.fcc1Atoms.push(atom);
        });

        // FCC2核心原子
        diamondCore.forEach(pos => {
            const atom = new THREE.Mesh(coreGeo, mats.fcc2Core);
            atom.position.set(...pos);
            scene.add(atom);
            groups.allFcc2.fcc2CoreAtoms.push(atom);
            groups.allFcc2.fcc2AllAtoms.push(atom);
        });

        // 晶胞框
        const cubeGeo = new THREE.BoxGeometry(a, a, a);
        const cubeEdges = new THREE.EdgesGeometry(cubeGeo);
        
        const frame1 = new THREE.LineSegments(cubeEdges, mats.frame1);
        frame1.position.set(a/2, a/2, a/2);
        scene.add(frame1);
        groups.core.fcc1Frame = frame1;

        const frame2 = new THREE.LineSegments(cubeEdges, mats.frame2);
        frame2.position.set(a/2+d, a/2+d, a/2+d);
        scene.add(frame2);
        groups.extend.fcc2Frame = frame2;

        // 化学键 (16条)
        const bondPairs = [
            [diamondCore[0], fcc1.vertex[0]], [diamondCore[0], fcc1.face[0]], [diamondCore[0], fcc1.face[2]], [diamondCore[0], fcc1.face[4]],
            [diamondCore[1], fcc1.face[0]], [diamondCore[1], fcc1.vertex[4]], [diamondCore[1], fcc1.face[5]], [diamondCore[1], fcc1.face[3]],
            [diamondCore[2], fcc1.face[2]], [diamondCore[2], fcc1.vertex[5]], [diamondCore[2], fcc1.face[5]], [diamondCore[2], fcc1.face[1]],
            [diamondCore[3], fcc1.face[4]], [diamondCore[3], fcc1.vertex[6]], [diamondCore[3], fcc1.face[3]], [diamondCore[3], fcc1.face[1]]
        ];

        bondPairs.forEach(([p1, p2]) => {
            const geo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(...p1),
                new THREE.Vector3(...p2)
            ]);
            const bond = new THREE.Line(geo, mats.bond);
            scene.add(bond);
            groups.core.bonds.push(bond);
        });

        // ========== 6. FCC2扩展原子 ==========
        const fcc2AllAtoms = [...fcc2.vertex, ...fcc2.face];
        fcc2AllAtoms.forEach(pos => {
            const isCore = diamondCore.some(core => 
                core[0] === pos[0] && core[1] === pos[1] && core[2] === pos[2]
            );
            if (!isCore) {
                const atom = new THREE.Mesh(atomGeo, mats.fcc2Extend);
                atom.position.set(...pos);
                scene.add(atom);
                groups.extend.fcc2ExtendAtoms.push(atom);
                groups.allFcc2.fcc2AllAtoms.push(atom);
            }
        });

        // ========== 7. 按钮控制逻辑 (原样保留，只操作显隐) ==========
        const toggleExtendBtn = document.getElementById('toggleExtendBtn');
        const toggleAllFcc2Btn = document.getElementById('toggleAllFcc2Btn');
        const toggleFcc1Btn = document.getElementById('toggleFcc1Btn');
        
        let isExtendHidden = false;
        let isAllFcc2Hidden = false;
        let isFcc1Hidden = false;

        toggleExtendBtn.addEventListener('click', () => {
            isExtendHidden = !isExtendHidden;
            groups.extend.fcc2ExtendAtoms.forEach(atom => atom.visible = !isExtendHidden);
            groups.extend.fcc2Frame.visible = !isExtendHidden;
            toggleExtendBtn.textContent = isExtendHidden ? "显示套构" : "显示金刚石结构";
            toggleExtendBtn.classList.toggle('active', isExtendHidden);
            
            // 确保核心FCC2原子始终可见 (除非被按钮2隐藏)
            if (!isAllFcc2Hidden) groups.allFcc2.fcc2CoreAtoms.forEach(atom => atom.visible = true);
            // 化学键逻辑：仅当FCC1未隐藏且FCC2未完全隐藏时显示
            if (!isFcc1Hidden && !isAllFcc2Hidden) {
                groups.core.bonds.forEach(bond => bond.visible = true);
            } else {
                groups.core.bonds.forEach(bond => bond.visible = false);
            }
            // 如果FCC1未隐藏，保证其显示
            if (!isFcc1Hidden) {
                groups.core.fcc1Atoms.forEach(atom => atom.visible = true);
                groups.core.fcc1Frame.visible = true;
            }
        });

        toggleAllFcc2Btn.addEventListener('click', () => {
            isAllFcc2Hidden = !isAllFcc2Hidden;
            groups.allFcc2.fcc2AllAtoms.forEach(atom => atom.visible = !isAllFcc2Hidden);
            groups.extend.fcc2Frame.visible = !isAllFcc2Hidden;
            groups.core.bonds.forEach(bond => bond.visible = (!isFcc1Hidden && !isAllFcc2Hidden));
            toggleAllFcc2Btn.textContent = isAllFcc2Hidden ? "显示紫色FCC" : "隐藏紫色FCC";
            toggleAllFcc2Btn.classList.toggle('active', isAllFcc2Hidden);
            
            if (!isFcc1Hidden) {
                groups.core.fcc1Atoms.forEach(atom => atom.visible = true);
                groups.core.fcc1Frame.visible = true;
            }
            // 同步按钮1的扩展原子隐藏状态
            if (isExtendHidden && !isAllFcc2Hidden) {
                groups.extend.fcc2ExtendAtoms.forEach(atom => atom.visible = false);
            }
        });

        toggleFcc1Btn.addEventListener('click', () => {
            isFcc1Hidden = !isFcc1Hidden;
            groups.core.fcc1Atoms.forEach(atom => atom.visible = !isFcc1Hidden);
            groups.core.fcc1Frame.visible = !isFcc1Hidden;
            groups.core.bonds.forEach(bond => bond.visible = (!isFcc1Hidden && !isAllFcc2Hidden));
            toggleFcc1Btn.textContent = isFcc1Hidden ? "显示黑色FCC" : "隐藏黑色FCC";
            toggleFcc1Btn.classList.toggle('active', isFcc1Hidden);

            if (!isAllFcc2Hidden) {
                groups.allFcc2.fcc2AllAtoms.forEach(atom => atom.visible = true);
                groups.extend.fcc2Frame.visible = !isExtendHidden;
            }
            if (isExtendHidden && !isAllFcc2Hidden) {
                groups.extend.fcc2ExtendAtoms.forEach(atom => atom.visible = false);
            }
        });

        // ========== 8. 光源 ==========
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const pointLight = new THREE.PointLight(0xffffff, 0.9);
        pointLight.position.set(5, 5, 7);
        scene.add(pointLight);
        const backLight = new THREE.PointLight(0xffffff, 0.4);
        backLight.position.set(-2, 1, -2);
        scene.add(backLight);

        // ========== 9. 移动端自适应: 面板折叠 + 汉堡菜单 ==========
        const infoPanel = document.getElementById('infoPanel');
        const panelContent = document.getElementById('panelContent');
        const toggleIcon = document.getElementById('toggleIcon');
        const panelHeader = document.getElementById('panelHeader');
        const controlButtons = document.getElementById('controlButtons');
        const menuToggle = document.getElementById('menuToggle');

        // 左侧面板折叠/展开 (手动点击)
        panelHeader.addEventListener('click', (e) => {
            e.stopPropagation();
            infoPanel.classList.toggle('collapsed');
            toggleIcon.textContent = infoPanel.classList.contains('collapsed') ? '▶' : '▼';
        });

        // 右侧菜单按钮点击 (只在手机可见)
        menuToggle.addEventListener('click', () => {
            controlButtons.classList.toggle('show');
        });

        // 根据窗口宽度调整布局 (自动折叠/展开 + 切换菜单)
        function adjustForScreen() {
            const width = window.innerWidth;
            const isMobile = width <= 768;

            // 左侧面板: 移动自动折叠, 桌面自动展开
            if (isMobile) {
                infoPanel.classList.add('collapsed');
                toggleIcon.textContent = '▶';
            } else {
                infoPanel.classList.remove('collapsed');
                toggleIcon.textContent = '▼';
            }

            // 右侧按钮: 移动隐藏控制组(除非手动打开), 显示汉堡; 桌面显示控制组, 隐藏汉堡
            if (isMobile) {
                // 移动: 默认隐藏控制组 (移除show类), 显示汉堡
                controlButtons.classList.remove('show');
                menuToggle.style.display = 'flex';
            } else {
                // 桌面: 显示控制组, 隐藏汉堡
                controlButtons.classList.add('show');
                menuToggle.style.display = 'none';
            }
        }

        // 监听resize
        window.addEventListener('resize', () => {
            adjustForScreen();
            // 相机比例更新
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 初始调用
        adjustForScreen();

        // 防止触摸事件穿透到canvas (按钮正常使用)
        document.querySelectorAll('button, .panel-header').forEach(el => {
            el.addEventListener('touchstart', (e) => e.stopPropagation());
        });

        // ========== 10. 动画循环 ==========
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 控制台验证
        console.log("✅ 移动自适应版加载完成");
        console.log(`FCC1原子:${groups.core.fcc1Atoms.length} | FCC2总原子:${groups.allFcc2.fcc2AllAtoms.length}`);
    </script>
</body>
</html>
